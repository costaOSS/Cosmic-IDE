name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses + install NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;29.0.13113456"

      # only if Firebase required
      - name: Restore google-services.json
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        run: ./gradlew assembleDevDebug

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apk-files
          path: app/build/outputs/apk/dev/debug/*.apk        run: ./gradlew clean

      - name: Build with Gradle
        run: ./gradlew assembleDevDebug

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a
          path: app/build/outputs/apk/dev/debug/app-dev-arm64-v8a-debug.apk

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: app-armeabi-v7a
          path: app/build/outputs/apk/dev/debug/app-dev-armeabi-v7a-debug.apk

      - name: Upload x86 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-x86
          path: app/build/outputs/apk/dev/debug/app-dev-x86-debug.apk

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-x86_64
          path: app/build/outputs/apk/dev/debug/app-dev-x86_64-debug.apk

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: app-universal
          path: app/build/outputs/apk/dev/debug/app-dev-universal-debug.apk
