name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4.2.1
        with:
          distribution: temurin
          java-version: 17

      - name: Give permission to executable
        run: chmod +x gradlew

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # IMPORTANT FIX
      - name: Accept SDK licenses and install NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;29.0.13113456"

      - name: Clean project
        run: ./gradlew clean

      - name: Build with Gradle
        run: ./gradlew assembleDevDebug

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a
          path: app/build/outputs/apk/dev/debug/app-dev-arm64-v8a-debug.apk

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: app-armeabi-v7a
          path: app/build/outputs/apk/dev/debug/app-dev-armeabi-v7a-debug.apk

      - name: Upload x86 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-x86
          path: app/build/outputs/apk/dev/debug/app-dev-x86-debug.apk

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-x86_64
          path: app/build/outputs/apk/dev/debug/app-dev-x86_64-debug.apk

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: app-universal
          path: app/build/outputs/apk/dev/debug/app-dev-universal-debug.apk
